# 配合归一化标签和有界回归器的配置
# 修改说明：
#   1. 使用 SurgicalQAModelBounded（带 Sigmoid 的有界模型）
#   2. 使用 SurgicalQADataLoaderNormalized（带分数归一化）
#   3. GRS 分数 [6,30] 归一化到 [0,1] 范围用于训练
#   4. 模型输出 [0,1]，推理时用 model.denormalize_score() 转换回 [6,30]
# ============================================================================
# DATA SETTINGS
# ============================================================================
data_root: /root/autodl-tmp/SV_test/data/heichole_calot  # JIGSAWS 数据集根目录
batch_size: 3
val_batch_size: 3         # 验证集的 Batch Size（不计算梯度，可以设大点）
test_batch_size: 9        # 测试集的 Batch Size
num_workers: 4
num_folds: 4
skip_val: true   # true 表示不划分那 3 个视频作为验证集，直接用测试集保存 best_model
#split_ratio: [0.7, 0.15, 0.15]  # 新增：70%训练，15%验证，15%测试
split_seed: 42

# ============================================================================
# SCORE NORMALIZATION SETTINGS
# ============================================================================
# JIGSAWS GRS 分数范围：6-30
# 归一化到 0-1 范围用于训练
score_min: 5.0           # 原始 GRS 分数最小值
score_max: 25.0          # 原始 GRS 分数最大值
target_min: 0.0         # 归一化目标最小值（用于训练）
target_max: 1.0         # 归一化目标最大值（用于训练）
# 新增：控制是否将分数归一化到 [0, 1] 以及是否使用 Sigmoid
normalize_scores: false  # 设为 false 则直接使用 5-25 或 1-5 的真实分数训练

# 归一化公式：
#   normalized = (score - score_min) / (score_max - score_min) * (target_max - target_min) + target_min
#   对于 GRS: normalized = (grs - 6) / 24

# 推理时，模型输出 [0,1] 通过 denormalize_score() 转换回 [6,30]
# ============================================================================

# ============================================================================
# VIDEO PREPROCESSING
# ============================================================================
clip_length: 16       # 论文要求: 16帧
clip_stride: 16       # 论文要求: 10帧步长
spatial_size: 112      # 论文要求: 112x112
spatial_crop: center   # 裁剪策略
normalize: true       # 归一化像素值到 [-1, 1]

# ============================================================================
# MODEL SETTINGS
# ============================================================================
static_dim: 128        # ResNet-34 特征维度
dynamic_dim: 1024      # I3D 特征维度（标准 Mixed_5c 输出）
freeze_backbone: true   # 冻结主干网络
#use_pretrained: true   # 使用 ImageNet 预训练权重
use_pretrained_resnet: true   # false 表示 ResNet 完全随机初始化
use_pretrained_i3d: true
#use_mask_loss: true   # 使用掩膜监督损失
use_mask: false
use_early_fusion: false  
# Backbone checkpoints
resnet_path: null       # ResNet 检查点路径
i3d_path: /root/autodl-tmp/PyTorchConv3D/checkpoints/I3D/rgb_imagenet.pth         # I3D 检查点路径
use_mixed_conv: false
# ============================================================================
# BOUNDED REGRESSION SETTINGS
# ============================================================================
use_bounded_regression: true   # 使用有界回归器（推荐）
regressor_hidden_dims: [128,64]  # 隐藏层维度
regressor_dropout: 0.3
# ============================================================================
# TRAINING SETTINGS
# ============================================================================
epochs: 150
#learning_rate: 0.0001
weight_decay: 0.0001      
momentum: 0.9
optimizer: adamw        # 选项: sgd, adam, adamw

# Learning rate scheduler
lr_scheduler: cosine      # 选项: cosine, step, plateau
lr_milestones: [30, 60, 90]
lr_gamma: 0.1

# 差分学习率（论文要求）
backbone_lr: 0.00001     # I3D 主干网络学习率
static_lr: 0.0001       # ResNet + 回归器学习率


# ============================================================================
# AMP AND MIXED PRECISION
# ============================================================================
use_amp: true         # 使用自动混合精度
clip_grad_norm: 1000.0   # 梯度裁剪

# ============================================================================
# EARLY STOPPING
# ============================================================================
early_stopping: true
patience: 10           # 论文要求: 10
min_delta: 0.001      # 最小改进阈值

# ============================================================================
# OUTPUT AND LOGGING
# ============================================================================
output_dir: ./output_muticlip_bounded
print_freq: 1        # 每 N 步打印一次
save_freq: 30          # 每 N 轮保存一次检查点
log_freq: 10          # 每 N 步记录一次 Tensor

# ============================================================================
# DEVICE SETTINGS
# ============================================================================
gpus: 0               # GPU ID（逗号分隔）
seed: 42              # 随机种子

#expected_clips: 71    # 🌟 告诉全连接层：请给我建一个容量为 72 个 Clip 的打分器！
max_clips: 45         # 🌟 告诉底层 I3D/ResNet：切到 72 个就立刻停手，别再往下切了，省点显存！

# ============================================================================
# TRANSFORMER SETTINGS (NEW)
# ============================================================================
transformer_heads: 4        # 注意力头数 (推荐 8)
transformer_layers: 1       # Transformer 层数 (层数太多可能过拟合，推荐 1~3 层)
transformer_ffn: 512       # 前馈网络隐藏层维度
transformer_dropout: 0.3    # 防止过拟合的 Dropout
# ====== 降维瓶颈层开关 ======
use_bottleneck: true      # true: 开启降维瓶颈层；false: 保持 1152 维原样进入 Transformer
bottleneck_dim: 256       # 如果开启瓶颈层，目标压缩维度是多少


use_warmup: true
warmup_epochs: 5
accumulation_steps: 3

# ==========================================
# 损失函数与多目标权重分配控制
# ==========================================
loss_type: 'score_plus_rank'      
score_loss_type: 'mae'            

use_mean_penalty: false           # （建议暂且关闭，防止捷径作弊）
use_tie_loss: false                # 🌟 新增：是否开启“同分聚合损失” (Tie Attraction)

use_dynamic_weights: false        # 🌟 (建议小样本时关闭，手动控制权重更稳)

lambda_rank: 1                  # 排序(排斥力) Loss 权重
lambda_mean: 0                  # 均值锚点 Loss 权重
lambda_tie: 0.0                   # 🌟 新增：同分聚合(吸引力) Loss 权重 (手动时生效)
use_dynamic_margin: true
rank_margin: 0.1              ##所有视频对margin相同
# ==========================================
# 多任务细粒度预测控制 (Sub-score Regression)
# ==========================================
use_sub_scores: false              # 🌟 是否开启多分支子项预测
num_sub_scores: 6                 # 子项的数量 (Hei-Chole 是 5)
sub_score_min: 1.0                # 每个子项的最低分
sub_score_max: 5.0                # 每个子项的最高分