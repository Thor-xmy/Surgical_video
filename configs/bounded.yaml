# ============================================================================
# BOUNDED VERSION CONFIGURATION
#
# 配合归一化标签和有界回归器的配置
# 修改说明：
#   1. 使用 SurgicalQAModelBounded（带 Sigmoid 的有界模型）
#   2. 使用 SurgicalQADataLoaderNormalized（带分数归一化）
#   3. GRS 分数 [6,30] 归一化到 [0,1] 范围用于训练
#   4. 模型输出 [0,1]，训练时无需反归一化
#   5. 推理时用 model.denormalize_score() 转换回 [1,10] 或 [6,30]
# ============================================================================

# ============================================================================
# DATA SETTINGS
# ============================================================================
data_root: /home/thor/sam3/jigsawas  # JIGSAWS 数据集根目录
batch_size: 8
num_workers: 4

# ============================================================================
# SCORE NORMALIZATION SETTINGS
# ============================================================================
# JIGSAWS GRS 分数范围：6-30
# 归一化到 0-1 范围用于训练
score_min: 6.0           # 原始 GRS 分数最小值
score_max: 30.0          # 原始 GRS 分数最大值
target_min: 0.0         # 归一化目标最小值（用于训练）
target_max: 1.0         # 归一化目标最大值（用于训练）

# 推理时可以选择的目标范围：
# 选项 1: 映射到论文分数 [1, 10]
# 选项 2: 保留原始 GRS 分数 [6, 30]
inference_target_range: [1.0, 10.0]  # 推理时的目标范围

# 归一化公式：
#   normalized = (score - score_min) / (score_max - score_min) * (target_max - target_min) + target_min
#   对于 GRS: normalized = (grs - 6) / 24 * 1.0 = (grs - 6) / 24

# ============================================================================
# VIDEO PREPROCESSING
# ============================================================================
clip_length: 16       # 论文要求: 16帧
clip_stride: 10       # 论文要求: 10帧步长
spatial_size: 112      # 论文要求: 112x112
spatial_crop: center   # 裁剪策略
normalize: true       # 归一化像素值到 [-1, 1]

# ============================================================================
# MODEL SETTINGS
# ============================================================================
static_dim: 512        # ResNet-34 特征维度
dynamic_dim: 1024      # I3D 特征维度（标准 Mixed_5c 输出）
freeze_backbone: true   # 冻结主干网络
use_pretrained: true   # 使用 ImageNet 预训练权重
use_mask_loss: true   # 使用掩膜监督损失

# Backbone checkpoints
resnet_path: null       # ResNet 检查点路径
i3d_path: null         # I3D 检查点路径

# ============================================================================
# BOUNDED REGRESSION SETTINGS
# ============================================================================
use_bounded_regression: true   # 使用有界回归器（推荐）
regressor_hidden_dims: [1024, 512, 256, 128]  # 隐藏层维度

# ============================================================================
# TRAINING SETTINGS
# ============================================================================
epochs: 100
learning_rate: 0.0001
weight_decay: 0.0      # 论文要求: 0!
momentum: 0.9
optimizer: adam        # 选项: sgd, adam, adamw

# Learning rate scheduler
lr_scheduler: cosine      # 选项: cosine, step, plateau
lr_milestones: [30, 60, 90]
lr_gamma: 0.1

# 差分学习率（论文要求）
backbone_lr: 0.0001     # I3D 主干网络学习率
static_lr: 0.001       # ResNet + 回归器学习率

# ============================================================================
# AMP AND MIXED PRECISION
# ============================================================================
use_amp: false         # 使用自动混合精度
clip_grad_norm: 1.0   # 梯度裁剪

# ============================================================================
# EARLY STOPPING
# ============================================================================
early_stopping: true
patience: 10           # 论文要求: 10
min_delta: 0.001      # 最小改进阈值

# ============================================================================
# LOSS SETTINGS
# ============================================================================
lambda_mask: 0.1       # 掩膜监督损失权重
lambda_score: 1.0      # 分数回归损失权重

# ============================================================================
# OUTPUT AND LOGGING
# ============================================================================
output_dir: ./output_bounded
print_freq: 10        # 每 N 步打印一次
save_freq: 1          # 每 N 轮保存一次检查点
log_freq: 10          # 每 N 步记录一次 Tensor

# ============================================================================
# DEVICE SETTINGS
# ============================================================================
gpus: 0               # GPU ID（逗号分隔）
seed: 42              # 随机种子
